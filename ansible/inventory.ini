[api_servers]
# =============================================================================
# Remote server (uncomment and replace with your VM's IP address)
# =============================================================================
# 192.168.1.100 ansible_user={{ lookup('env', 'ANSIBLE_SSH_USER') | default('ubuntu') }} ansible_ssh_private_key_file={{ lookup('env', 'ANSIBLE_SSH_PRIVATE_KEY_FILE') | default('~/.ssh/id_rsa') }}

# =============================================================================
# Local testing (comment out when deploying to remote)
# =============================================================================
localhost ansible_connection=local ansible_python_interpreter=/usr/bin/python3
